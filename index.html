<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDC LV 2026 🎡</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan:   #00eeff;
    --pink:   #ff073a;
    --acid:   #39ff14;
    --gold:   #ffd600;
    --purple: #9b00ff;
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── CANVAS LAYERS ── */
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #cvBg  { z-index: 1; }
  #cvFx  { z-index: 2; }

  /* ── SHELL ── */
  .shell {
    position: relative; z-index: 5;
    width: 100%; height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px 16px 28px;
    gap: 0;
  }

  /* ── TAGLINE ── */
  .tagline {
    font-size: clamp(.48rem, 2.4vw, .66rem);
    letter-spacing: .42em;
    text-transform: uppercase;
    color: var(--cyan);
    opacity: .75;
    margin-bottom: 2px;
    animation: fadeUp .8s .1s ease both;
  }

  /* ── LOGO ── */
  .logo-wrap {
    text-align: center;
    animation: fadeUp .8s ease both;
    margin-bottom: 4px;
  }
  .logo-edc {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5.5rem, 26vw, 10rem);
    line-height: .85;
    letter-spacing: .06em;
    background: linear-gradient(170deg, #fff 0%, #fff 35%, var(--cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    /* glow via filter — works everywhere */
    filter: drop-shadow(0 0 18px rgba(0,238,255,.9)) drop-shadow(0 0 50px rgba(0,238,255,.4));
    animation: logoPulse 2.5s ease-in-out infinite alternate;
  }
  @keyframes logoPulse {
    0%   { filter: drop-shadow(0 0 16px rgba(0,238,255,.8)) drop-shadow(0 0 50px rgba(0,238,255,.3)); }
    100% { filter: drop-shadow(0 0 36px rgba(0,238,255,1))  drop-shadow(0 0 90px rgba(155,0,255,.5)); }
  }
  .logo-sub {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1rem, 5vw, 1.9rem);
    letter-spacing: .48em;
    background: linear-gradient(90deg, var(--pink), var(--gold), var(--acid));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 10px rgba(255,214,0,.6));
    margin-top: -2px;
    display: block;
  }

  /* ── COUNTDOWN GRID ── */
  .countdown {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(6px, 2.2vw, 12px);
    width: 100%; max-width: 430px;
    margin: 10px 0 8px;
    animation: fadeUp .8s .3s ease both;
  }
  .unit {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .box {
    width: 100%; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    border-radius: 10px;
    background: rgba(0,0,0,.7);
    /* Solid glowing border — universally supported */
    border: 1.5px solid rgba(255,255,255,.12);
    overflow: hidden;
  }
  /* Animated gradient overlay inside box for glow feel */
  .box-glow {
    position: absolute; inset: 0;
    border-radius: 9px;
    opacity: .1;
    animation: glowPulse 1.8s ease-in-out infinite alternate;
  }
  @keyframes glowPulse { 0% { opacity: .05; } 100% { opacity: .18; } }

  .unit:nth-child(1) .box          { border-color: rgba(0,238,255,.45);   box-shadow: 0 0 18px rgba(0,238,255,.25),   inset 0 0 14px rgba(0,238,255,.07); }
  .unit:nth-child(2) .box          { border-color: rgba(155,0,255,.45);   box-shadow: 0 0 18px rgba(155,0,255,.25),   inset 0 0 14px rgba(155,0,255,.07); }
  .unit:nth-child(3) .box          { border-color: rgba(255,7,58,.45);    box-shadow: 0 0 18px rgba(255,7,58,.25),    inset 0 0 14px rgba(255,7,58,.07); }
  .unit:nth-child(4) .box          { border-color: rgba(57,255,20,.45);   box-shadow: 0 0 18px rgba(57,255,20,.25),   inset 0 0 14px rgba(57,255,20,.07); }
  .unit:nth-child(1) .box-glow     { background: radial-gradient(circle at 50% 90%, rgba(0,238,255,.8), transparent 70%); }
  .unit:nth-child(2) .box-glow     { background: radial-gradient(circle at 50% 90%, rgba(155,0,255,.8), transparent 70%); }
  .unit:nth-child(3) .box-glow     { background: radial-gradient(circle at 50% 90%, rgba(255,7,58,.8), transparent 70%); }
  .unit:nth-child(4) .box-glow     { background: radial-gradient(circle at 50% 90%, rgba(57,255,20,.8), transparent 70%); }

  .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 11vw, 3.8rem);
    line-height: 1;
    letter-spacing: .02em;
    position: relative; z-index: 2;
    transition: transform .1s ease;
  }
  .unit:nth-child(1) .num { color: var(--cyan);   text-shadow: 0 0 14px var(--cyan),   0 0 40px rgba(0,238,255,.5); }
  .unit:nth-child(2) .num { color: var(--purple);  text-shadow: 0 0 14px var(--purple), 0 0 40px rgba(155,0,255,.5); }
  .unit:nth-child(3) .num { color: var(--pink);    text-shadow: 0 0 14px var(--pink),   0 0 40px rgba(255,7,58,.5); }
  .unit:nth-child(4) .num { color: var(--acid);    text-shadow: 0 0 14px var(--acid),   0 0 40px rgba(57,255,20,.5); }

  .num.pop { animation: numPop .28s cubic-bezier(.34,1.8,.64,1); }
  @keyframes numPop { 0% { transform: scale(1.35); } 100% { transform: scale(1); } }

  .lbl {
    font-size: clamp(.38rem, 1.8vw, .54rem);
    letter-spacing: .28em;
    text-transform: uppercase;
    color: rgba(255,255,255,.38);
  }

  /* ── DIVIDER ── */
  .divider {
    width: 100%; max-width: 430px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), var(--pink), transparent);
    opacity: .45;
    margin: 6px 0;
    animation: fadeUp .8s .4s ease both;
  }

  /* ── DATE ── */
  .date-block {
    text-align: center;
    margin-bottom: 8px;
    animation: fadeUp .8s .5s ease both;
  }
  .date-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.3rem, 6.5vw, 2rem);
    letter-spacing: .18em;
    color: #fff;
    text-shadow: 0 0 16px rgba(255,255,255,.25);
  }
  .date-sub {
    font-size: clamp(.42rem, 2vw, .58rem);
    letter-spacing: .22em;
    color: rgba(255,255,255,.32);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── PROGRESS ── */
  .prog-wrap {
    width: 100%; max-width: 430px;
    animation: fadeUp .8s .6s ease both;
  }
  .prog-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 5px;
  }
  .prog-label {
    font-size: clamp(.38rem, 1.8vw, .5rem);
    letter-spacing: .2em; text-transform: uppercase;
    color: rgba(255,255,255,.28);
  }
  .prog-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(.7rem, 3.5vw, 1rem);
    letter-spacing: .08em;
    color: var(--gold);
    text-shadow: 0 0 10px rgba(255,214,0,.55);
  }
  .prog-track {
    width: 100%; height: 5px;
    background: rgba(255,255,255,.07);
    border-radius: 99px;
    position: relative;
    overflow: visible;
  }
  .prog-fill {
    height: 100%; border-radius: 99px;
    /* Use background-position animation instead of @property */
    background: linear-gradient(90deg, var(--purple), var(--cyan), var(--acid), var(--purple));
    background-size: 300% 100%;
    animation: shimmer 3s linear infinite;
    transition: width 1s ease;
    box-shadow: 0 0 10px var(--cyan), 0 0 24px rgba(0,238,255,.3);
    position: relative;
  }
  @keyframes shimmer { 0% { background-position: 0% 0; } 100% { background-position: 300% 0; } }
  .prog-fill::after {
    content: '';
    position: absolute; right: -5px; top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 10px; border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px var(--cyan), 0 0 18px var(--cyan);
  }

  /* ── VIBE MSG ── */
  .vibe {
    margin-top: 9px; text-align: center;
    animation: fadeUp .8s .7s ease both;
  }
  .vibe-text {
    font-size: clamp(.48rem, 2.3vw, .64rem);
    letter-spacing: .14em; text-transform: uppercase;
    color: var(--gold);
    text-shadow: 0 0 10px rgba(255,214,0,.45);
    animation: vibePulse 2s ease-in-out infinite alternate;
  }
  @keyframes vibePulse { 0% { opacity: .65; } 100% { opacity: 1; } }

  /* ── EQ BARS ── */
  .eq {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 3px; height: 26px;
    margin-top: 10px;
    animation: fadeUp .8s .8s ease both;
  }
  .eq-bar {
    width: clamp(4px, 1.5vw, 7px);
    border-radius: 2px 2px 0 0;
    transform-origin: bottom;
    animation: eqB var(--d, .4s) ease-in-out infinite alternate;
  }
  @keyframes eqB { 0% { transform: scaleY(.1); } 100% { transform: scaleY(1); } }

  /* ── FOOTER ── */
  .footer {
    position: fixed; bottom: 7px; left: 0; right: 0;
    text-align: center;
    font-size: .42rem; letter-spacing: .28em; text-transform: uppercase;
    color: rgba(255,255,255,.14);
    z-index: 6;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }

  /* ── IT'S TIME ── */
  .itstime {
    display: none; position: fixed; inset: 0; z-index: 20;
    align-items: center; justify-content: center; flex-direction: column;
    gap: 14px; text-align: center; padding: 30px;
    background: rgba(0,0,0,.92);
  }
  .itstime.on { display: flex; }
  .itstime h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 16vw, 6rem);
    background: linear-gradient(135deg, var(--cyan), var(--pink), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: logoPulse 1s infinite alternate;
  }
  .itstime p {
    font-size: clamp(.55rem, 2.5vw, .75rem);
    letter-spacing: .25em; color: rgba(255,255,255,.5);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<canvas id="cvBg"></canvas>
<canvas id="cvFx"></canvas>

<div class="shell">
  <div class="tagline">✦ Under The Electric Sky ✦</div>

  <div class="logo-wrap">
    <span class="logo-edc">EDC</span>
    <span class="logo-sub">Las Vegas · 2026</span>
  </div>

  <div class="countdown">
    <div class="unit">
      <div class="box"><div class="box-glow"></div><span class="num" id="nd">--</span></div>
      <span class="lbl">Days</span>
    </div>
    <div class="unit">
      <div class="box"><div class="box-glow"></div><span class="num" id="nh">--</span></div>
      <span class="lbl">Hours</span>
    </div>
    <div class="unit">
      <div class="box"><div class="box-glow"></div><span class="num" id="nm">--</span></div>
      <span class="lbl">Mins</span>
    </div>
    <div class="unit">
      <div class="box"><div class="box-glow"></div><span class="num" id="ns">--</span></div>
      <span class="lbl">Secs</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="date-block">
    <div class="date-main">May 15 – 17 · 2026</div>
    <div class="date-sub">Las Vegas Motor Speedway · Nevada</div>
  </div>

  <div class="prog-wrap">
    <div class="prog-head">
      <span class="prog-label">Hype Progress</span>
      <span class="prog-pct" id="pctTxt">0%</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="progFill" style="width:0%"></div>
    </div>
  </div>

  <div class="vibe"><span class="vibe-text" id="vibeTxt">Loading vibes...</span></div>

  <div class="eq" id="eqEl"></div>
</div>

<div class="footer">#EDCLV2026 · 30th Anniversary · Kinetic Journey</div>

<div class="itstime" id="itstime">
  <h1>IT'S TIME 🎡</h1>
  <p>Under The Electric Sky</p>
</div>

<script>
// ── CANVAS SETUP ──────────────────────────────────────
const cvBg = document.getElementById('cvBg');
const ctBg = cvBg.getContext('2d');
const cvFx = document.getElementById('cvFx');
const ctFx = cvFx.getContext('2d');
let W = 0, H = 0;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  cvBg.width = cvFx.width = W;
  cvBg.height = cvFx.height = H;
}
window.addEventListener('resize', resize);
resize();

// ── BACKGROUND + ORBS ────────────────────────────────
let kickFlash = 0;
function drawBg(t) {
  ctBg.clearRect(0, 0, W, H);

  // Deep radial base
  const gBase = ctBg.createRadialGradient(W * .5, H, 0, W * .5, H, H * 1.3);
  gBase.addColorStop(0,   'rgba(70,0,110,.4)');
  gBase.addColorStop(.5,  'rgba(0,15,50,.55)');
  gBase.addColorStop(1,   '#000');
  ctBg.fillStyle = gBase;
  ctBg.fillRect(0, 0, W, H);

  // Pulsing color orbs
  const orbs = [
    { cx: .18, cy: .72, rx: .48, c: [0, 238, 255], p: 1.2 },
    { cx: .82, cy: .68, rx: .44, c: [155, 0, 255],  p: 1.7 },
    { cx: .5,  cy: .9,  rx: .55, c: [255, 7, 58],   p: .85 },
  ];
  orbs.forEach(o => {
    const a = (Math.sin(t * o.p) * .5 + .5) * .12 + .04;
    const gr = ctBg.createRadialGradient(W * o.cx, H * o.cy, 0, W * o.cx, H * o.cy, W * o.rx);
    gr.addColorStop(0, `rgba(${o.c[0]},${o.c[1]},${o.c[2]},${a.toFixed(3)})`);
    gr.addColorStop(1, 'rgba(0,0,0,0)');
    ctBg.fillStyle = gr;
    ctBg.fillRect(0, 0, W, H);
  });

  // Kick flash
  if (kickFlash > 0) {
    ctBg.fillStyle = `rgba(255,255,255,${(kickFlash * .06).toFixed(3)})`;
    ctBg.fillRect(0, 0, W, H);
    kickFlash = Math.max(0, kickFlash - .05);
  }
}

// ── LASERS ───────────────────────────────────────────
const LASER_COLORS = ['#00eeff','#ff073a','#9b00ff','#39ff14','#ffd600'];
const lasers = [];

function spawnLaser() {
  const fromLeft = Math.random() < .5;
  lasers.push({
    x: fromLeft ? 0 : W,
    y: H * (.5 + Math.random() * .5),
    angle: fromLeft
      ? -Math.PI / 8 + Math.random() * (Math.PI / 4)
      : Math.PI - Math.PI / 8 + Math.random() * (Math.PI / 4),
    len:   W * (.3 + Math.random() * .55),
    color: LASER_COLORS[Math.floor(Math.random() * LASER_COLORS.length)],
    life:  1,
    decay: .014 + Math.random() * .012,
  });
}
setInterval(spawnLaser, 550);

function drawLasers() {
  for (let i = lasers.length - 1; i >= 0; i--) {
    const l = lasers[i];
    l.life -= l.decay;
    if (l.life <= 0) { lasers.splice(i, 1); continue; }
    const ex = l.x + Math.cos(l.angle) * l.len;
    const ey = l.y + Math.sin(l.angle) * l.len;

    ctFx.save();
    ctFx.globalAlpha = l.life * .55;
    ctFx.shadowBlur  = 20;
    ctFx.shadowColor = l.color;
    ctFx.strokeStyle = l.color;
    ctFx.lineWidth   = 1.5;
    ctFx.beginPath(); ctFx.moveTo(l.x, l.y); ctFx.lineTo(ex, ey); ctFx.stroke();
    ctFx.globalAlpha = l.life * .1;
    ctFx.lineWidth   = 10;
    ctFx.stroke();
    ctFx.restore();
  }
}

// ── PARTICLES ────────────────────────────────────────
const PART_COLS = ['#00eeff','#ff073a','#9b00ff','#39ff14','#ffd600','#ffffff'];
const parts = [];

function spawnParticles(x, y, burst) {
  const n = burst ? 22 : 1;
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = burst ? (1.5 + Math.random() * 5) : (.3 + Math.random() * .9);
    parts.push({
      x: x != null ? x : Math.random() * W,
      y: y != null ? y : H + 4,
      vx:    Math.cos(angle) * speed,
      vy:    Math.sin(angle) * speed - (burst ? 0 : (.6 + Math.random() * 1.4)),
      life:  1,
      decay: .009 + Math.random() * .018,
      r:     burst ? (2 + Math.random() * 4) : (1 + Math.random() * 2),
      color: PART_COLS[Math.floor(Math.random() * PART_COLS.length)],
      grav:  burst ? .07 : -.005,
    });
  }
}

// Ambient drift-up particles
setInterval(() => spawnParticles(null, null, false), 110);

// Touch/click burst
function onTap(px, py) {
  spawnParticles(px, py, true);
  kickFlash = 1;
}
document.addEventListener('click',      e => onTap(e.clientX, e.clientY));
document.addEventListener('touchstart', e => {
  const t = e.changedTouches[0];
  onTap(t.clientX, t.clientY);
}, { passive: true });

function drawParticles() {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += p.grav;
    p.life -= p.decay;
    if (p.life <= 0 || p.y > H + 20) { parts.splice(i, 1); continue; }

    ctFx.save();
    ctFx.globalAlpha = p.life;
    ctFx.shadowBlur  = 8;
    ctFx.shadowColor = p.color;
    ctFx.fillStyle   = p.color;
    ctFx.beginPath();
    ctFx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctFx.fill();
    ctFx.restore();
  }
}

// ── MAIN RENDER LOOP ─────────────────────────────────
let startTs = null;
function loop(ts) {
  if (!startTs) startTs = ts;
  const t = (ts - startTs) / 1000;

  drawBg(t);

  ctFx.clearRect(0, 0, W, H);
  drawLasers();
  drawParticles();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── EQ BARS ──────────────────────────────────────────
const eqEl = document.getElementById('eqEl');
const EQ_COLORS = ['var(--cyan)','var(--purple)','var(--pink)','var(--acid)','var(--gold)'];
for (let i = 0; i < 20; i++) {
  const b = document.createElement('div');
  b.className = 'eq-bar';
  const col = EQ_COLORS[i % EQ_COLORS.length];
  b.style.cssText = [
    `height:${18 + Math.random() * 82}%`,
    `--d:${(.22 + Math.random() * .48).toFixed(2)}s`,
    `background:${col}`,
    `box-shadow:0 0 6px ${col}`,
    `animation-delay:${(Math.random() * .4).toFixed(2)}s`,
  ].join(';');
  eqEl.appendChild(b);
}

// ── COUNTDOWN ────────────────────────────────────────
const EDC_DATE  = new Date('2026-05-15T20:00:00');
const HYPE_FROM = new Date('2026-01-01T00:00:00');

const elD = document.getElementById('nd');
const elH = document.getElementById('nh');
const elM = document.getElementById('nm');
const elS = document.getElementById('ns');
const progFill = document.getElementById('progFill');
const pctTxt   = document.getElementById('pctTxt');
const vibeTxt  = document.getElementById('vibeTxt');

let prevD = -1, prevH = -1, prevM = -1, prevS = -1;

function pad2(n) { return String(Math.floor(n)).padStart(2, '0'); }

function pop(el) {
  el.classList.remove('pop');
  void el.offsetWidth;   // force reflow
  el.classList.add('pop');
}

const VIBES = [
  { d: 200, msg: '🎡 Mark your calendar, Headliner!' },
  { d: 100, msg: '🚀 Under 100 days — start planning your fits!' },
  { d: 60,  msg: '🎵 60 days — build those playlists!' },
  { d: 30,  msg: '💊 One month out — hydrate & prepare!' },
  { d: 14,  msg: '✈️ Two weeks — book those hotels NOW!' },
  { d: 7,   msg: '🔥 ONE WEEK — can you feel the bass?!' },
  { d: 3,   msg: '⚡ 3 DAYS — almost Under the Electric Sky!' },
  { d: 1,   msg: "🌅 TOMORROW — it's almost time, Headliner!" },
  { d: 0,   msg: '🎡 TODAY IS EDC — GO GO GO!!!' },
];
function getVibe(d) {
  for (const v of VIBES) if (d <= v.d) return v.msg;
  return `🎶 ${d} days until the Electric Sky opens!`;
}

function tick() {
  const now  = new Date();
  const diff = EDC_DATE - now;

  if (diff <= 0) {
    document.getElementById('itstime').classList.add('on');
    return;
  }

  // Progress
  const totalSpan = EDC_DATE - HYPE_FROM;
  const elapsed   = now - HYPE_FROM;
  const pct = Math.min(Math.max(elapsed / totalSpan * 100, 0), 100);
  progFill.style.width = pct.toFixed(2) + '%';
  pctTxt.textContent   = pct.toFixed(1) + '%';

  // Time units
  const days = Math.floor(diff / 864e5);
  const hrs  = Math.floor(diff % 864e5 / 36e5);
  const mins = Math.floor(diff % 36e5  / 6e4);
  const secs = Math.floor(diff % 6e4   / 1e3);

  if (days !== prevD) { elD.textContent = days;     pop(elD); prevD = days; }
  if (hrs  !== prevH) { elH.textContent = pad2(hrs); pop(elH); prevH = hrs; }
  if (mins !== prevM) { elM.textContent = pad2(mins);pop(elM); prevM = mins; }
  if (secs !== prevS) { elS.textContent = pad2(secs);pop(elS); prevS = secs; kickFlash = .5; }

  vibeTxt.textContent = getVibe(days);
}

tick();
setInterval(tick, 1000);
</script>
